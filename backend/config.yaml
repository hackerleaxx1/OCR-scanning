app:
  host: "0.0.0.0"
  port: 8000
  debug: false
  upload_dir: "./uploads"
  max_file_size: 10485760  # 10MB

ocr:
  tesseract_path: null  # Auto-detect
  language: "eng"
  confidence_threshold: 60

ml:
  input_dim: 500
  hidden_dims: [128, 64, 32]
  dropout: 0.3
  classification_weight: 2.0
  regression_weight: 1.0
  default_epochs: 50
  default_learning_rate: 0.01
  fine_tune_learning_rate: 0.001

training:
  auto_retrain_threshold: 5
  batch_size: 16
  validation_split: 0.2
  early_stopping_patience: 10

vendors:
  storage_dir: "./vendors"

invoices:
  storage_dir: "./invoices"
  pending_dir: "./pending_validation"
